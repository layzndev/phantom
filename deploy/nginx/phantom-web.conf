server {
    listen 80;
    listen [::]:80;
    server_name admin.nptnz.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.nptnz.com;

    ssl_certificate /etc/letsencrypt/live/admin.nptnz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.nptnz.com/privkey.pem;

    access_log /var/log/nginx/phantom-web.access.log;
    error_log /var/log/nginx/phantom-web.error.log warn;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
